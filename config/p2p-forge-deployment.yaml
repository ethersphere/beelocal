apiVersion: v1
kind: ConfigMap
metadata:
  name: p2p-forge-config
  namespace: ${NAMESPACE}
data:
  Corefile: |
    local.test:53 {
        errors
        log
        ipparser local.test
        acme local.test {
            registration-domain p2p-forge.${NAMESPACE}.svc.cluster.local:8080 listen-address=:8080 external-tls=true
            database-type badger /data
        }
    }
  local.test: |
    $TTL 300
    $ORIGIN local.test.
    @ 86400 IN SOA ns.local.test. admin.local.test. (
        2025010101 ; serial
        86400      ; refresh
        2400       ; retry
        604800     ; expire
        86400      ; minimum
    )
    local.test. 86400 IN NS ns.local.test.
    ns.local.test. 86400 IN A 127.0.0.1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: p2p-forge
  namespace: ${NAMESPACE}
  labels:
    app: p2p-forge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: p2p-forge
  template:
    metadata:
      labels:
        app: p2p-forge
    spec:
      containers:
      - name: p2p-forge
        image: ghcr.io/ipshipyard/p2p-forge:${P2P_FORGE_IMAGE_TAG}
        args:
          - "-conf"
          - "/config/Corefile"
        ports:
        - name: api
          containerPort: 8080
          protocol: TCP
        - name: dns
          containerPort: 53
          protocol: UDP
        volumeMounts:
        - name: p2p-forge-config
          mountPath: /config
        - name: p2p-forge-zones
          mountPath: /p2p-forge/zones
        - name: p2p-forge-data
          mountPath: /data
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: p2p-forge-config
        configMap:
          name: p2p-forge-config
          items:
          - key: Corefile
            path: Corefile
      - name: p2p-forge-zones
        configMap:
          name: p2p-forge-config
          items:
          - key: local.test
            path: local.test
      - name: p2p-forge-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: p2p-forge
  namespace: ${NAMESPACE}
  labels:
    app: p2p-forge
spec:
  type: NodePort
  ports:
  - name: api
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: dns
    port: 53
    targetPort: 53
    protocol: UDP
    nodePort: 30053
  selector:
    app: p2p-forge
